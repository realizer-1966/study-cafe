{% extends "base.html" %}
{% block title %}로그인 - Study Cafe{% endblock %}
{% block content %}
<div style="max-width: 420px; margin: 2rem auto;">
  <div class="card">
    <h2>🔐 로그인</h2>
    <form method="POST" action="{{ url_for('login') }}">
      <div class="form-group">
        <label>아이디</label>
        <input type="text" name="username" required placeholder="아이디 입력" autofocus>
      </div>
      <div class="form-group">
        <label>비밀번호</label>
        <input type="password" name="password" required placeholder="비밀번호 입력">
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary btn-block">로그인</button>
      </div>
    </form>
    <div style="margin-top:1rem; padding:12px; background: #fef3c7; border-radius:8px; font-size:0.85rem; color:#92400e;">
      💡 관리자 계정: <strong>admin</strong> / <strong>admin123</strong>
    </div>
    <p style="text-align:center; margin-top:1rem; color: var(--text-light);">
      계정이 없으신가요? <a href="{{ url_for('register') }}" style="color: var(--primary); font-weight:600;">회원가입</a>
    </p>
  </div>
</div>
{% endblock %}
