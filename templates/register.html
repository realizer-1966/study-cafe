{% extends "base.html" %}
{% block title %}회원가입 - Study Cafe{% endblock %}
{% block content %}
<div style="max-width: 420px; margin: 2rem auto;">
  <div class="card">
    <h2>📝 회원가입</h2>
    <form method="POST" action="{{ url_for('register') }}">
      <div class="form-group">
        <label>아이디</label>
        <input type="text" name="username" required placeholder="아이디 입력">
      </div>
      <div class="form-group">
        <label>이메일</label>
        <input type="email" name="email" required placeholder="이메일 입력">
      </div>
      <div class="form-group">
        <label>비밀번호</label>
        <input type="password" name="password" required placeholder="비밀번호 입력">
      </div>
      <div class="form-group">
        <label>전화번호 (선택)</label>
        <input type="tel" name="phone" placeholder="010-xxxx-xxxx">
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary btn-block">가입하기</button>
      </div>
    </form>
    <p style="text-align:center; margin-top:1rem; color: var(--text-light);">
      이미 계정이 있으신가요? <a href="{{ url_for('login') }}" style="color: var(--primary); font-weight:600;">로그인</a>
    </p>
  </div>
</div>
{% endblock %}
